version: '3.8'

services:
  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    restart: on-failure
    environment:
      - PORT=8080
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tiny_inventory
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./web
      args:
        - VITE_API_URL=/api
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tiny_inventory
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
