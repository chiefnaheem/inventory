version: '3.8'

services:
  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    restart: on-failure
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/tiny_inventory?schema=public}
    depends_on:
      - db

  web:
    build:
      context: ./web
    ports:
      - "3000:80"
    depends_on:
      - server

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tiny_inventory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
